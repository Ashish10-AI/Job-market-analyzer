name: Daily Job Market Scraper

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        id: scrape
        continue-on-error: true
        run: |
          python scraper.py 2>&1 | tee scraper_run.log

      - name: Evaluate scraper status
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "::error::Scraper encountered a critical error."
          cat scraper_run.log
          exit 1

      - name: Commit and push database update
        if: steps.scrape.outcome == 'success'
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add jobs.db

          # Only commit when the DB actually changed
          git diff --staged --quiet || \
            git commit -m "chore(data): automated daily scrape [skip ci]"

          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-error-logs-${{ github.run_id }}
          path: scraper_run.log
          retention-days: 7
